<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="icon" href="https://cdn-icons-png.freepik.com/512/3861/3861172.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body>
    <section>
        <div class="card" style="width: 18rem;">
            <img src="./img/fondo_azul.png" class="card-img-top" alt="...">

            <div class="card-body text-center">
                <h5 class="card-title">Juan Sebastian Ruiz</h5>
                <p class="card-text">Full Stack Developer!</p>
            </div>

            <ul class="list-group list-group-flush text-center">
                <li class="list-group-item">Desarrollador full stack js, java, python, Amante de la tecnologia con conocimientos en cloud computing y arquitectura IT.</li>
            </ul>

            <div class="card-body d-flex gap-2 justify-content-between">
                <a href="#" class="btn btn-primary flex-fill d-flex align-items-center justify-content-center"
                    style="--bs-btn-padding-y: .25rem; --bs-btn-padding-x: .5rem; --bs-btn-font-size: .75rem;">
                    Gmail
                </a>

                <a href="#" class="btn btn-primary flex-fill d-flex align-items-center justify-content-center"
                    style="--bs-btn-padding-y: .25rem; --bs-btn-padding-x: .5rem; --bs-btn-font-size: .75rem;">
                    Linkedin
                </a>

                <a href="#" class="btn btn-primary flex-fill d-flex align-items-center justify-content-center"
                    style="--bs-btn-padding-y: .25rem; --bs-btn-padding-x: .5rem; --bs-btn-font-size: .75rem;">
                    GitHub
                </a>
            </div>
        </div>
    </section>

</body>

</html>
