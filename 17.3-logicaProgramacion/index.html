<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orden de numeros</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form id="form">
        <h1>Ordenar 3 numeros</h1>
        <h2>Escriba 3 numeros en los campos de texto</h2>

        <ul>
            <li>
                <label for="one">Numero 1:</label>
                <input type="number" class="inputs" name="one" id="one">
            </li>
            <li>
                <label for="two">Numero 2:</label>
                <input type="number" class="inputs" name="two" id="two">
            </li>
            <li>
                <label for="three">Numero 3:</label>
                <input type="number" class="inputs" name="three" id="three">
            </li>
            <li>
                <button type="submit" id="boton">Enviar</button>
            </li>
            <li>
                <label id="respuesta"></span>
            </li>
        </ul>
    </form>
</body>
<script src="script.js"></script>

</html>
